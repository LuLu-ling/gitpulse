name: Release App

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: gitpulse
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  release:
    name: Draft Release & Publish Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release inputs
        id: version
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${GITHUB_REF_NAME} must match vX.X.X." >&2
            exit 1
          fi

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Repository variable DOCKERHUB_USERNAME is required." >&2
            exit 1
          fi

          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "Repository variable DOCKERHUB_NAMESPACE is required, or set it to the same value as DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Repository secret DOCKERHUB_TOKEN is required." >&2
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          repository="${GITHUB_REPOSITORY,,}"
          dockerhub_namespace="${DOCKERHUB_NAMESPACE,,}"
          image_name="${IMAGE_NAME,,}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${repository}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=docker.io/${dockerhub_namespace}/${image_name}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.version.outputs.ghcr_image }}
            ${{ steps.version.outputs.dockerhub_image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release notes
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch auto-generated release notes from GitHub. Falls back to empty
          # on failure (e.g. first release with no prior tag to compare).
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            --jq '.body' > auto-notes.md 2>/dev/null || true

          {
            echo "## Container images"
            echo
            while IFS= read -r image_tag; do
              [ -z "${image_tag}" ] && continue
              echo "- \`${image_tag}\`"
            done <<< "${IMAGE_TAGS}"
            echo
            if [ -s auto-notes.md ]; then
              cat auto-notes.md
            fi
          } > release-notes.md

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "GitPulse v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            --verify-tag
